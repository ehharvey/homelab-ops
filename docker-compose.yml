services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CONFIG_REPO_URL=git://config-repo/fleet.git
      - CONFIG_REPO_REF=main
    depends_on:
      - config-repo

  config-repo:
    build: ./dev/git-fixture

  loki:
    image: grafana/loki:3.7.3
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.13.0
    ports:
      - "9090:9090"
    volumes:
      - ./dev/observability-stack/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"

  grafana:
    image: grafana/grafana:13.1.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./dev/observability-stack/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
      - prometheus
