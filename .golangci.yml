version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - gosec
    - misspell
    - nilnil
    - revive
    - unconvert
    - unparam
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
