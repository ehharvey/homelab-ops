name: Bug report
description: Something built isn't working as intended
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Include the component involved (bootstrap CLI, web app module, IncusOS seed, etc.).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: IncusOS version, node hardware, dev k8s cluster, etc.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      render: shell
    validations:
      required: false
