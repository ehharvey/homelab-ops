name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - run: go build ./...
      - run: go test ./... -race -cover

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9.2.1
